version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  node1:
    build: .
    environment:
      - GOFRAME_EXAMPLE_PORT=8091
      - GOFRAME_EXAMPLE_ADMIN_CLUSTER_ENABLED=1
      - GOFRAME_EXAMPLE_ADMIN_CLUSTER_REDIS_URL=redis://redis:6379/1
      - GOFRAME_EXAMPLE_ADMIN_CLUSTER_NODE_ID=node1
      - GOFRAME_EXAMPLE_SESSION_STORE=redis
      - GOFRAME_EXAMPLE_SESSION_REDIS_URL=redis://redis:6379/2
      - GOFRAME_EXAMPLE_ADMIN_BOOTSTRAP_PASSWORD=admin123
    ports:
      - "8091:8091"
    depends_on:
      - redis

  node2:
    build: .
    environment:
      - GOFRAME_EXAMPLE_PORT=8092
      - GOFRAME_EXAMPLE_ADMIN_CLUSTER_ENABLED=1
      - GOFRAME_EXAMPLE_ADMIN_CLUSTER_REDIS_URL=redis://redis:6379/1
      - GOFRAME_EXAMPLE_ADMIN_CLUSTER_NODE_ID=node2
      - GOFRAME_EXAMPLE_SESSION_STORE=redis
      - GOFRAME_EXAMPLE_SESSION_REDIS_URL=redis://redis:6379/2
      - GOFRAME_EXAMPLE_ADMIN_BOOTSTRAP_PASSWORD=admin123
    ports:
      - "8092:8092"
    depends_on:
      - redis

  loadbalancer:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8090:8090"
    depends_on:
      - node1
      - node2
