version: 2

project_name: nucleus

builds:
  - id: nucleus
    main: ./cmd/nucleus
    binary: nucleus
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/jcsvwinston/nucleus/internal/cli.Version={{ .Version }}

archives:
  - id: cli-binaries
    ids:
      - nucleus
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  disable: true
