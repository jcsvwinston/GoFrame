name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test And Smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.23.x"
          - "1.26.x"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Setup Node
        if: matrix.go-version == '1.26.x'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Go Tests
        run: go test ./...

      - name: Run Example Smoke
        if: matrix.go-version == '1.26.x'
        run: go test ./examples/mvc_api -run TestExampleMVCAPIAdmin_Smoke -v

      - name: Check Admin UI JS Syntax
        if: matrix.go-version == '1.26.x'
        run: |
          node --check pkg/admin/ui/components.js
          node --check pkg/admin/ui/app.js
