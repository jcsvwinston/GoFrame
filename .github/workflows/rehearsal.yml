name: Release Rehearsal

on:
  workflow_dispatch:

jobs:
  rehearsal:
    name: Rehearse RC (No Publish)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Rehearsal Script
        run: ./scripts/release/rehearse_rc.sh
