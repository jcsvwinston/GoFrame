version: v2

# Generated stubs are committed so that:
#   * `go build ./...` works on a fresh checkout without buf installed
#   * the proto module is self-contained and importable
#   * `buf breaking` runs against committed sources
#
# Run `make proto` to regenerate after any change to admin/proto/**/*.proto.
# CI verifies that `make proto` produces no diff (admin-skeleton job).

clean: true

plugins:
  # Go message types
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative

  # Connect-RPC Go bindings (server + client)
  - remote: buf.build/connectrpc/go
    out: gen/go
    opt:
      - paths=source_relative

  # TypeScript message types (for admin/ui)
  - remote: buf.build/bufbuild/es
    out: ../ui/src/gen
    opt:
      - target=ts
      - import_extension=.js

  # Connect-Web TypeScript bindings (client only; UI never serves)
  - remote: buf.build/connectrpc/es
    out: ../ui/src/gen
    opt:
      - target=ts
      - import_extension=.js
