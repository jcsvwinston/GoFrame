<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoFrame Admin</title>
  <link rel="stylesheet" href="static/style.css">
</head>

<body class="theme-frameworkos">
  <div class="bg-grid"></div>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>
  <div class="layout" id="layout">
    <aside class="sidebar" id="sidebar" aria-label="Admin navigation">
      <div class="sidebar-head">
        <div class="sidebar-brand">
          <div class="brand-mark">GF</div>
          <div>
            <p class="brand-caption">GoFrame</p>
            <h1 id="site-title">Admin</h1>
          </div>
        </div>
        <button type="button" class="icon-btn sidebar-dock-btn" id="sidebar-dock-toggle" aria-label="Collapse sidebar">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 6l-6 6 6 6"></path>
            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
            <path d="M16 4v16"></path>
          </svg>
        </button>
      </div>
      <nav class="nav-links" id="primary-nav">
        <a href="#/" class="nav-link active" data-nav="overview">
          <span class="nav-icon">
            <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5 12 3l9 7.5"></path>
              <path d="M5 9.5V21h14V9.5"></path>
            </svg>
          </span>
          <span class="nav-label">Overview</span>
        </a>
        <a href="#/data-studio" class="nav-link" data-nav="data-studio">
          <span class="nav-icon">
            <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <ellipse cx="12" cy="6" rx="7" ry="3"></ellipse>
              <path d="M5 6v6c0 1.7 3.1 3 7 3s7-1.3 7-3V6"></path>
              <path d="M5 12v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"></path>
            </svg>
          </span>
          <span class="nav-label">Data Studio</span>
        </a>
        <a href="#/system" class="nav-link" data-nav="system">
          <span class="nav-icon">
            <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="18" height="5" rx="1"></rect>
              <rect x="3" y="10" width="18" height="5" rx="1"></rect>
              <rect x="3" y="16" width="18" height="5" rx="1"></rect>
              <path d="M7 6.5h.01M7 12.5h.01M7 18.5h.01"></path>
            </svg>
          </span>
          <span class="nav-label">System Pulse</span>
        </a>
        <a href="#/live" class="nav-link" data-nav="network">
          <span class="nav-icon">
            <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12h4l2-5 4 10 2-5h6"></path>
            </svg>
          </span>
          <span class="nav-label">Network Inspector</span>
        </a>
        <a href="#/sessions" class="nav-link" data-nav="infra">
          <span class="nav-icon">
            <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="9" cy="8" r="3"></circle>
              <path d="M4 19c0-2.8 2.2-5 5-5s5 2.2 5 5"></path>
              <path d="M15 10h6"></path>
              <path d="M18 7v6"></path>
            </svg>
          </span>
          <span class="nav-label">Infra Manager</span>
        </a>
        <a href="#/health" class="nav-link" data-nav="health">
          <span class="nav-icon">
            <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22 12h-4l-3 9-5-18-5 18-3-9H2"></path>
            </svg>
          </span>
          <span class="nav-label">Health</span>
        </a>
        <a href="#/rbac" class="nav-link" data-nav="rbac">
          <span class="nav-icon">
            <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
          </span>
          <span class="nav-label">Access Control</span>
        </a>
        <a href="#/audit" class="nav-link" data-nav="audit">
          <span class="nav-icon">
            <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <path d="M14 2v6h6"></path>
              <path d="M16 13H8"></path>
              <path d="M16 17H8"></path>
              <path d="M10 9H8"></path>
            </svg>
          </span>
          <span class="nav-label">Audit Log</span>
        </a>
      </nav>
      <div class="sidebar-foot">
        <span class="runtime-dot"></span>
        <span class="sidebar-foot-label">All systems nominal</span>
      </div>
    </aside>

    <div class="shell">
      <header class="topbar">
        <button type="button" class="icon-btn" id="menu-toggle" aria-label="Toggle menu">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16"></path>
          </svg>
        </button>
        <button type="button" class="command-btn" id="cmdk-open">
          <span class="command-title">Search models, engines or actions</span>
          <kbd>Ctrl/Cmd + K</kbd>
        </button>
        <div class="topbar-actions">
          <select id="tenant-selector" class="input" style="display:none;min-width:120px" title="Select tenant">
            <option value="">All Tenants</option>
          </select>
          <select id="site-selector" class="input" style="display:none;min-width:100px" title="Select site">
            <option value="">All Sites</option>
          </select>
          <select id="db-selector" class="input" style="display:none;min-width:100px" title="Select database">
          </select>
          <button type="button" class="btn btn-ghost" id="refresh-btn">Refresh</button>
          <button type="button" class="btn btn-ghost btn-theme" id="theme-toggle" aria-label="Toggle color theme"
            title="Switch to light mode">
            <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4"></circle>
              <path
                d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4">
              </path>
            </svg>
            <span id="theme-toggle-label">Dark</span>
          </button>
          <select id="locale-selector" class="input" style="width:80px;padding:4px 8px;font-size:12px" title="Language">
            <option value="en">EN</option>
            <option value="es">ES</option>
          </select>
          <button type="button" class="btn btn-primary" id="new-record-btn">New record</button>
          <div class="dropdown" id="export-history-dropdown" style="position:relative;display:none">
            <button type="button" class="btn btn-ghost" id="export-history-btn" title="Recent exports">
              <svg class="icon-svg" viewBox="0 0 24 24" style="width:16px;height:16px" aria-hidden="true">
                <path d="M12 8v4l3 3"></path>
                <circle cx="12" cy="12" r="10"></circle>
              </svg>
              Recent
            </button>
            <div class="dropdown-menu hidden" id="export-history-menu"></div>
          </div>
        </div>
        <div class="topbar-runtime" id="runtime-env">
          <span class="runtime-dot"></span>
          <span id="runtime-env-pill">Development</span>
        </div>
      </header>

      <nav class="breadcrumbs" id="breadcrumbs" aria-label="Breadcrumb"></nav>

      <main class="view" id="app" aria-live="polite"></main>
    </div>
  </div>

  <div class="toast-container" id="toasts" aria-live="polite" aria-atomic="true"></div>

  <div class="overlay hidden" id="command-palette" role="dialog" aria-modal="true" aria-labelledby="cmdk-title"
    aria-hidden="true">
    <div class="palette-card">
      <div class="palette-head">
        <h2 id="cmdk-title">Command palette</h2>
        <button type="button" class="icon-btn" id="cmdk-close" aria-label="Close">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12"></path>
            <path d="M18 6l-12 12"></path>
          </svg>
        </button>
      </div>
      <input id="cmdk-input" type="search" placeholder="Type a model or action..." role="combobox" aria-expanded="false"
        aria-controls="cmdk-list" aria-autocomplete="list">
      <div class="palette-list" id="cmdk-list" role="listbox"></div>
    </div>
  </div>

  <div class="overlay hidden" id="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title"
    aria-hidden="true">
    <div class="modal-card">
      <h2 id="confirm-title">Confirm action</h2>
      <p id="confirm-text">Are you sure?</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="confirm-cancel">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirm-accept">Confirm</button>
      </div>
    </div>
  </div>

  <div class="overlay hidden" id="export-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-card" style="max-width:480px">
      <h2>Export Data</h2>
      <div id="export-modal-body"></div>
    </div>
  </div>

  <div class="overlay hidden" id="import-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-card" style="max-width:560px">
      <h2>Import Data</h2>
      <div id="import-modal-body"></div>
    </div>
  </div>

  <script src="static/vendor/chart.umd.min.js"></script>
  <script src="static/vendor/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="static/i18n.js"></script>
  <script src="static/components.js"></script>
  <script src="static/app.js"></script>
</body>

</html>
